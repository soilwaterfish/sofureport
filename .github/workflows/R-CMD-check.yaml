# In .github/workflows/R-CMD-check.yaml

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::devtools
          needs: check

      - name: Run devtools::test() with API Key
        # This is the crucial step where we inject the secret
        env:
          FEMS_API_KEY: ${{ secrets.FEMS_API_KEY }}
          SYNOPTIC_TOKEN: ${{ secrets.SYNOPTIC_TOKEN }}
          FEMS_EMAIL: ${{secrets.FEMS_EMAIL}}
          ZENTRACLOUD_TOKEN: ${{secrets.ZENTRACLOUD_TOKEN}}
        run: devtools::test(reporter = "summary")
        shell: Rscript {0}

      - name: Run R CMD check
        run: |
          options(crayon.enabled = TRUE)
          rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning", check_dir = "check")
        shell: Rscript {0}

      - name: Show test failures
        if: failure()
        run: |
          find check -name "testthat.Rout.fail" -exec cat {} +
        shell: bash
