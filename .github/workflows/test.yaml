name: tests

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::testthat
          needs: test

      - name: Session info
        run: sessionInfo()
        shell: Rscript {0}

      - name: Run testthat tests
        env:
          FEMS_API_KEY: ${{ secrets.FEMS_API_KEY }}
          SYNOPTIC_TOKEN: ${{ secrets.SYNOPTIC_TOKEN }}
          FEMS_EMAIL: ${{ secrets.FEMS_EMAIL }}
          ZENTRACLOUD_TOKEN: ${{ secrets.ZENTRACLOUD_TOKEN }}
        run: devtools::test(reporter = "summary")
        shell: Rscript {0}
